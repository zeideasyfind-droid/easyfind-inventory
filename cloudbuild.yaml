steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/easyfind-inventory:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/easyfind-inventory:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/easyfind-inventory:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/easyfind-inventory:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'easyfind-inventory'
      - '--image=gcr.io/$PROJECT_ID/easyfind-inventory:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--set-env-vars=FIRECRAWL_API_KEY=$$FIRECRAWL_API_KEY,GOOGLE_SHEET_ID=$$GOOGLE_SHEET_ID,GOOGLE_SERVICE_ACCOUNT_JSON=$$GOOGLE_SERVICE_ACCOUNT_JSON,GOOGLE_DRIVE_FOLDER_ID=$$GOOGLE_DRIVE_FOLDER_ID,GOOGLE_MAPS_API_KEY=$$GOOGLE_MAPS_API_KEY,WHATSAPP_TOKEN=$$WHATSAPP_TOKEN,PHONE_NUMBER_ID=$$PHONE_NUMBER_ID,WHATSAPP_RECIPIENT_NUMBER=$$WHATSAPP_RECIPIENT_NUMBER,META_CATALOG_ID=$$META_CATALOG_ID,CLOUDINARY_CLOUD_NAME=$$CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY=$$CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET=$$CLOUDINARY_API_SECRET'

images:
  - 'gcr.io/$PROJECT_ID/easyfind-inventory:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/easyfind-inventory:latest'
