steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/easyfind-inventory:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/easyfind-inventory:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/easyfind-inventory:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/easyfind-inventory:latest']

  # Deploy to Cloud Run — secrets are managed via Cloud Console, not injected
  # here, so existing Cloud Run env vars are preserved across deployments.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'easyfind-inventory'
      - '--image=gcr.io/$PROJECT_ID/easyfind-inventory:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'

images:
  - 'gcr.io/$PROJECT_ID/easyfind-inventory:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/easyfind-inventory:latest'
